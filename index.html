<!DOCTYPE html>
<html>
<body>
    <h2>Area Calculator</h2>
    <input type="number" id="val1" placeholder="Value 1">
    <input type="number" id="val2" placeholder="Value 2 (if needed)">
    <button onclick="calculate()">Calculate</button>
    <p id="result"></p>

    <script>
        async function calculate() {
            // Prepare data to send to the Azure Function
            const payload = {
                shape: 'rectangle', 
                data: { width: document.getElementById('val1').value, height: document.getElementById('val2').value }
            };

            // Call the Azure Function endpoint
            const response = await fetch('https://YOUR_FUNCTION_URL.azurewebsites.net/api/CalculateArea', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            document.getElementById('result').innerText = "Area: " + result.area;
        }
    </script>
</body>
</html>
